# Render Blueprint for the MedChron AI backend.
# One-time setup: on render.com, "New" -> "Blueprint" -> connect the
# adityaayushman/medvision GitHub repo. Render reads this file and deploys
# the backend automatically; every push to main redeploys it.
#
# NOTE (free tier): disk is ephemeral (uploads/SQLite reset on redeploy or
# restart after idle) and the service sleeps after 15 min idle (~30-50s cold
# start on the next request). Fine for a demo; upgrade to a paid plan + a
# persistent disk (or a hosted Postgres) for real patient-data persistence.
services:
  - type: web
    name: medchron-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: MEDCHRON_MODALITY
        value: chest_xray
      - key: MODEL_CHECKPOINT
        value: /app/backend/model/model_efficientnet_b0.pt
      - key: MODEL_CHECKPOINT_BRAIN_MRI
        # Rolled back to single-model: both the 3-way and 2-way ensembles
        # (see git log) crashed/crash-looped this free-tier 512MB instance
        # under real repeated requests -- confirmed via Render's deploy logs
        # (explicit OOM on 3-way) and live testing (2-way completed one
        # 30-40s request, then the worker died and 502'd on the next one).
        # The ensemble capability (EnsemblePredictor, evaluate_ensemble)
        # stays in the codebase and works correctly -- it's genuinely a
        # resource ceiling, not a bug -- so it's revisitable on a paid plan
        # or a lighter pairing, evaluated for both accuracy AND memory/
        # latency next time before deploying, not just accuracy.
        value: /app/backend/model/model_efficientnet_b0_brain_mri.pt
      - key: MODEL_CHECKPOINT_MAMMOGRAPHY
        value: /app/backend/model/model_efficientnet_b0_mammography.pt
      - key: CORS_ORIGINS
        value: https://medchron-ai.vercel.app,http://localhost:3000
      - key: JWT_SECRET
        # Render generates this once and keeps it stable across deploys, so
        # it never lands in this (public) repo. Without it, config.py falls
        # back to a hardcoded dev default that anyone reading the source can
        # use to forge a valid admin token for /dashboard.
        generateValue: true
      - key: DATABASE_URL
        # Set manually in the Render dashboard (Environment tab) -- it's a
        # secret, so sync: false keeps it out of the repo. Point it at the
        # Supabase/Postgres instance (psycopg2-binary is already in
        # backend/requirements.txt, and db.py normalizes postgres:// ->
        # postgresql:// and enables pool_pre_ping for hosted Postgres).
        # WITHOUT this, the backend silently falls back to SQLite on the
        # container's ephemeral disk: every redeploy or idle-restart wipes
        # all accounts, patients, studies, and audit logs.
        sync: false
